<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fallout 1 Community Edition</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
}

body {
    display: flex;
    align-items: center;
    justify-content: center;
}

canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: min(100vw, calc(100vh * 4 / 3));
    height: min(100vh, calc(100vw * 3 / 4));
    margin: auto;
    image-rendering: pixelated;
}

#overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.85);
    z-index: 10;
    cursor: pointer;
}

#overlay h1 {
    font-size: 2rem;
    margin-bottom: 1.5rem;
    color: #4f4;
    text-shadow: 0 0 12px rgba(68, 255, 68, 0.5);
}

#start-button {
    font-size: 1.5rem;
    padding: 0.75rem 2rem;
    background: #4f4;
    color: #000;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.15s;
}

#start-button:hover {
    background: #6f6;
}

#error-overlay {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.92);
    z-index: 20;
}

#error-overlay h2 {
    font-size: 1.5rem;
    color: #f44;
    margin-bottom: 1rem;
}

#error-message {
    max-width: 80vw;
    max-height: 40vh;
    overflow: auto;
    background: #1a1a1a;
    border: 1px solid #f44;
    border-radius: 4px;
    padding: 1rem;
    font-family: monospace;
    font-size: 0.9rem;
    color: #faa;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 1.5rem;
}

#reload-button {
    font-size: 1.1rem;
    padding: 0.5rem 1.5rem;
    background: #f44;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.15s;
}

#reload-button:hover {
    background: #f66;
}

.hidden {
    display: none !important;
}
</style>
</head>
<body>

<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

<div id="overlay">
    <h1>Fallout 1 — Community Edition</h1>
    <button id="start-button">Click to Start</button>
</div>

<div id="error-overlay">
    <h2>Engine Error</h2>
    <pre id="error-message"></pre>
    <button id="reload-button" onclick="location.reload()">Reload</button>
</div>

<script>
function showError(msg) {
    var errorOverlay = document.getElementById('error-overlay');
    var errorMessage = document.getElementById('error-message');
    errorMessage.textContent = String(msg);
    errorOverlay.style.display = 'flex';
    console.error('[fallout-ce] Fatal: ' + msg);
}

var Module = {
    canvas: document.getElementById('canvas'),
    noInitialRun: true,
    onAbort: function(what) {
        showError(what || 'Engine aborted');
    },
    onExit: function(code) {
        if (code !== 0) {
            showError('Engine exited with code ' + code);
        }
    },
    print: function(text) {
        console.log('[fallout-ce] ' + text);
    },
    printErr: function(text) {
        console.error('[fallout-ce] ' + text);
    }
};

document.getElementById('start-button').addEventListener('click', function() {
    var overlay = document.getElementById('overlay');
    overlay.classList.add('hidden');

    try {
        Module.callMain();
    } catch (e) {
        // Asyncify unwind exceptions are normal and should not be caught.
        // They have a specific shape — rethrow them.
        if (e instanceof WebAssembly.RuntimeError || (e.message && e.message.indexOf('unreachable') !== -1)) {
            showError(e.message || String(e));
        } else if (typeof e === 'number') {
            // Emscripten may throw an exit status number
            if (e !== 0) {
                showError('Engine exited with code ' + e);
            }
        } else if (e !== 'unwind') {
            showError(e.message || String(e));
        }
    }
});
</script>

</body>
</html>
